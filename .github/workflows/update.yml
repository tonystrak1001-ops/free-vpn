*\u042D\u0442\u043E\u0442 \u0440\u0435\u043F\u043E\u0437\u0438\u0442\u043E\u0440\u0438\u0439 \u043E\u0431\u043D\u043E\u0432\u043B\u044F\u0435\u0442\u0441\u044F \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u0438\u0447\u0435\u0441\u043A\u0438 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E GitHub Actions.*
"""

    return readme

print("=== \u0417\u0430\u043F\u0443\u0441\u043A \u0441\u043A\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u0438\u044F \u0443\u0437\u043B\u043E\u0432 ===")
all_nodes = []
seen = set()

for url in SOURCES:
    print(f"\u0417\u0430\u0433\u0440\u0443\u0437\u043A\u0430: {url}")
    nodes = fetch_source(url)
    print(f"  \u041D\u0430\u0439\u0434\u0435\u043D\u043E \u0443\u0437\u043B\u043E\u0432: {len(nodes)}")
    for node in nodes:
        key = f"{node['type']}:{node['host']}:{node['port']}"
        if key not in seen:
            seen.add(key)
            all_nodes.append(node)

total_fetched = len(all_nodes)
print(f"\u0412\u0441\u0435\u0433\u043E \u0443\u043D\u0438\u043A\u0430\u043B\u044C\u043D\u044B\u0445 \u0443\u0437\u043B\u043E\u0432: {total_fetched}")

