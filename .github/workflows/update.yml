        "vless": "\U0001F7E2",
        "trojan": "\U0001F534",
    }

    for proto in ["ss", "vmess", "vless", "trojan"]:
        if proto not in nodes_by_type or not nodes_by_type[proto]:
            continue
        emoji = type_emojis.get(proto, "\u26AA")
        name = type_names.get(proto, proto.upper())
        nodes = nodes_by_type[proto]

        readme += f"## {emoji} {name} ({len(nodes)} \u0443\u0437\u043B\u043E\u0432)\n\n"
        readme += "`\n"
        for node in nodes:
            readme += f"{node['raw']}\n"
        readme += "`\n\n"

    readme += """---

## \U0001F4D6 \u041A\u0430\u043A \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C

